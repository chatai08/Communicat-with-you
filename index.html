<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Mera Chat App - Individual Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #ECE5DD; display: flex; justify-content: center; align-items: center; height: 100vh; }

  .phone { width: 380px; height: 700px; background: #fff; border-radius: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; }

  .header { background: #075E54; color: white; padding: 16px; font-size: 16px; font-weight: bold;
    display: flex; align-items: center; gap: 10px; }
  .header .back-btn { cursor: pointer; font-size: 18px; display: none; }

  .name-setup { padding: 20px; text-align: center; }
  .name-setup input { padding: 10px; width: 80%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; }
  .name-setup button { padding: 10px 20px; background: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; }
  .error-text { color: #d33; font-size: 12px; margin-bottom: 8px; min-height: 16px; }

  /* Contacts / online users list */
  .contacts-list { flex: 1; overflow-y: auto; display: none; }
  .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    border-bottom: 1px solid #eee; cursor: pointer; }
  .contact-item:hover { background: #f5f5f5; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #075E54; color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
  .contact-info { flex: 1; min-width: 0; }
  .contact-name { font-size: 15px; font-weight: 600; }
  .contact-sub { font-size: 12px; color: #777; }
  .unread-badge { background: #25D366; color: white; font-size: 11px; font-weight: bold;
    border-radius: 50%; min-width: 20px; height: 20px; display: flex; align-items: center;
    justify-content: center; padding: 0 5px; }
  .empty-state { padding: 30px 16px; text-align: center; color: #888; font-size: 13px; }

  .chat-area { flex: 1; padding: 16px; overflow-y: auto; background: #E5DDD5;
    display: flex; flex-direction: column; gap: 8px; }

  .message { max-width: 70%; padding: 8px 12px; border-radius: 10px; font-size: 14px; }
  .message.sent { background: #DCF8C6; align-self: flex-end; border-top-right-radius: 0; }
  .message.received { background: #ffffff; align-self: flex-start; border-top-left-radius: 0; }
  .time { font-size: 10px; color: #777; margin-top: 4px; display: block; text-align: right; }
  .typing-indicator { font-size: 12px; color: #666; font-style: italic; padding: 0 16px 6px; display: none; }

  .input-area { display: none; padding: 10px; background: #f0f0f0; gap: 8px; }
  .input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: none; outline: none; font-size: 14px; }
  .input-area button { background: #25D366; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <span class="back-btn" id="backBtn">←</span>
    <span id="headerTitle">📱 Mera Chat App</span>
  </div>

  <!-- Step 1: apna naam poocho -->
  <div class="name-setup" id="nameSetup">
    <p style="margin-bottom:10px;">Apna naam likho:</p>
    <input type="text" id="nameInput" placeholder="Jaise: Rahul">
    <div class="error-text" id="nameError"></div>
    <button onclick="joinChat()">Chat Shuru Karo</button>
  </div>

  <!-- Step 2: online contacts ki list -->
  <div class="contacts-list" id="contactsList"></div>

  <!-- Step 3: ek specific insaan ke saath chat -->
  <div class="chat-area" id="chatArea"></div>
  <div class="typing-indicator" id="typingIndicator"></div>
  <div class="input-area" id="inputArea">
    <input type="text" id="messageInput" placeholder="Message likho...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Socket.io library - ye real-time connection banati hai -->
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let myName = "";
  let activeChatWith = null;          // is waqt kis user se chat khuli hai
  const unreadCounts = {};            // { username: count }
  let onlineUsersList = [];
  let typingTimeout = null;

  // ---------- Screens dikhane/chupane ke liye ----------
  function showScreen(screen) {
    document.getElementById('nameSetup').style.display = screen === 'name' ? 'block' : 'none';
    document.getElementById('contactsList').style.display = screen === 'contacts' ? 'block' : 'none';
    document.getElementById('chatArea').style.display = screen === 'chat' ? 'flex' : 'none';
    document.getElementById('inputArea').style.display = screen === 'chat' ? 'flex' : 'none';
    document.getElementById('backBtn').style.display = screen === 'chat' ? 'inline' : 'none';
    document.getElementById('typingIndicator').style.display = 'none';
    document.getElementById('headerTitle').textContent = screen === 'chat' ? activeChatWith : '📱 Mera Chat App';
  }

  // ---------- Step 1: naam se join karna ----------
  function joinChat() {
    const name = document.getElementById('nameInput').value.trim();
    if (name === "") return;

    // Browser se notification permission maang lo (pehli baar hi)
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    socket.emit('set-name', name);
  }

  socket.on('name-error', (msg) => {
    document.getElementById('nameError').textContent = msg;
  });

  socket.on('name-accepted', (name) => {
    myName = name;
    document.getElementById('nameError').textContent = '';
    showScreen('contacts');
  });

  document.getElementById('nameInput')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') joinChat();
  });

  // ---------- Step 2: online users ki list ----------
  socket.on('user-list', (users) => {
    onlineUsersList = users.filter(u => u !== myName);
    renderContacts();
  });

  function renderContacts() {
    const list = document.getElementById('contactsList');
    list.innerHTML = '';

    if (onlineUsersList.length === 0) {
      list.innerHTML = '<div class="empty-state">Abhi koi aur online nahi hai. Kisi aur ko is app par aane do 🙂</div>';
      return;
    }

    onlineUsersList.forEach(user => {
      const item = document.createElement('div');
      item.className = 'contact-item';
      const unread = unreadCounts[user] || 0;

      item.innerHTML = `
        <div class="avatar">${user.charAt(0).toUpperCase()}</div>
        <div class="contact-info">
          <div class="contact-name">${user}</div>
          <div class="contact-sub">Tap karke chat kholo</div>
        </div>
        ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
      `;
      item.onclick = () => openChatWith(user);
      list.appendChild(item);
    });
  }

  // ---------- Step 3: kisi ek user ke saath individual chat kholna ----------
  function openChatWith(user) {
    activeChatWith = user;
    unreadCounts[user] = 0;
    document.getElementById('chatArea').innerHTML = '';
    showScreen('chat');
    socket.emit('get-history', { withUser: user });
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    activeChatWith = null;
    showScreen('contacts');
    renderContacts();
  });

  socket.on('chat-history', ({ withUser, messages }) => {
    if (withUser !== activeChatWith) return;
    messages.forEach(showMessage);
  });

  // ---------- Message bhejna ----------
  function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (text === "" || !activeChatWith) return;

    socket.emit('private-message', { to: activeChatWith, text });
    input.value = "";
  }

  document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
    else if (activeChatWith) socket.emit('typing', { to: activeChatWith });
  });

  // ---------- Message screen par dikhana ----------
  function showMessage(data) {
    const chatArea = document.getElementById('chatArea');
    const msgDiv = document.createElement('div');

    const type = (data.from === myName) ? 'sent' : 'received';
    msgDiv.className = 'message ' + type;
    msgDiv.innerHTML = data.text + '<span class="time">' + data.time + '</span>';

    chatArea.appendChild(msgDiv);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ---------- Chhota "beep" sound notification ke liye ----------
  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 700;
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    } catch (e) { /* audio blocked, ignore */ }
  }

  // ---------- Jab bhi koi private message aaye (real time, turant) ----------
  socket.on('private-message', (data) => {
    const otherPerson = data.from === myName ? data.to : data.from;

    // Agar wahi chat is waqt khuli hai to seedha dikha do
    if (activeChatWith === otherPerson) {
      showMessage(data);
      return;
    }

    // Warna: sirf tab notify karo jab message doosre se aaya ho (khud ke bheje pe nahi)
    if (data.from !== myName) {
      unreadCounts[otherPerson] = (unreadCounts[otherPerson] || 0) + 1;
      renderContacts();
      playBeep();

      if ('Notification' in window && Notification.permission === 'granted') {
        const notif = new Notification(data.from + ' ne message bheja', {
          body: data.text,
          tag: 'chat-' + data.from
        });
        notif.onclick = () => {
          window.focus();
          openChatWith(data.from);
        };
      }
    }
  });

  // ---------- Typing indicator ----------
  socket.on('typing', ({ from }) => {
    if (from !== activeChatWith) return;
    const indicator = document.getElementById('typingIndicator');
    indicator.textContent = from + ' likh rahe hain...';
    indicator.style.display = 'block';

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { indicator.style.display = 'none'; }, 1500);
  });
</script>

</body>
</html>
